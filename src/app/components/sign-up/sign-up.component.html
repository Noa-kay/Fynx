<div class="app-screen-wrapper">
  <div class="bubble-background">
    <div class="bubble" style="--size: 80px; left: 10%; bottom: -100px; --duration: 15s; --delay: 0s;"></div>
    <div class="bubble" style="--size: 40px; left: 70%; bottom: -50px; --duration: 20s; --delay: 5s;"></div>
    <div class="bubble" style="--size: 150px; left: 35%; bottom: -150px; --duration: 10s; --delay: 8s;"></div>
    <div class="bubble" style="--size: 25px; left: 90%; bottom: -30px; --duration: 25s; --delay: 3s;"></div>
    <div class="bubble" style="--size: 100px; left: 5%; bottom: -120px; --duration: 18s; --delay: 12s;"></div>
    <div class="bubble" style="--size: 70px; left: 55%; bottom: -90px; --duration: 14s; --delay: 6s;"></div>
    <div class="bubble" style="--size: 30px; left: 20%; bottom: -40px; --duration: 22s; --delay: 10s;"></div>
  </div>

  <div class="app-screen">
    <div class="form-card">
      <div class="logo-container">
        <img src="assets/images/Logo.png" alt="Fynx Logo" class="app-logo">
      </div>
      <h1 class="app-title">Create Account</h1>

      <form #signUpForm="ngForm" (ngSubmit)="onSignUpSubmit(signUpForm)" class="form-content">
        <input type="text" [(ngModel)]="signUpData.username" name="username" placeholder="Username" class="form-input" required minlength="3">
        <input type="email" [(ngModel)]="signUpData.email" name="email" placeholder="Email" class="form-input" required email>
        
        <div class="password-input-wrapper">
          <input [type]="showPassword ? 'text' : 'password'" [(ngModel)]="signUpData.password" name="password" placeholder="Password" class="form-input" required minlength="6">
          <button type="button" class="toggle-password-btn" (click)="togglePasswordVisibility()">
            <svg *ngIf="!showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="eye-icon">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg *ngIf="showPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="eye-icon">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
        </div>
        
        <div class="password-input-wrapper">
          <input [type]="showConfirmPassword ? 'text' : 'password'" [(ngModel)]="signUpData.confirmPassword" name="confirmPassword" placeholder="Confirm Password" class="form-input" required>
          <button type="button" class="toggle-password-btn" (click)="toggleConfirmPasswordVisibility()">
            <svg *ngIf="!showConfirmPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="eye-icon">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
            </svg>
            <svg *ngIf="showConfirmPassword" viewBox="0 0 24 24" fill="none" stroke="currentColor" class="eye-icon">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
            </svg>
          </button>
        </div>

        <div *ngIf="signUpForm.submitted && !passwordsAreIdentical()" class="error-message">
          Passwords must match.
        </div>

        <button type="submit" [disabled]="!passwordsAreIdentical() || loading" class="btn btn-primary">
          <svg *ngIf="!loading" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width: 1.2em; height: 1.2em;"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-7a4 4 0 11-8 0 4 4 0 018 0zM6 16v1a3 3 0 003 3h10a3 3 0 003-3v-1a7 7 0 00-2-5.48M13 14h-2m-2 0H7m-3 0H2m4 4h7m-7 0H2"/></svg>
          {{ loading ? 'Signing Up...' : 'Create Account' }}
        </button>
      </form>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <p class="account-link">
        Already have an account?
        <a [routerLink]="['/sign-in']" class="link-text">Sign In Here</a>
      </p>
    </div>
  </div>
</div>
