<div class="app-screen-wrapper">
  
  <div class="bubble-background">
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
    <div class="bubble"></div>
  </div>

  <header class="app-header">
    <div class="logo"><img src="assets/images/Logo.png" alt="Fynx Logo"></div>
    <nav>
      <a routerLink="/feed" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
        Home
      </a>
      <a routerLink="/categories" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"/></svg>
        Categories
      </a>
      <a routerLink="/chat" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"/></svg>
        AI Chat
      </a>
    </nav>
    
    <div class="avatar-dropdown-wrapper">
            
            <div class="user-avatar-small-container sweezy-custom-cursor-hover" (click)="toggleAvatarMenu()">
                <img [src]="authService.getFullAvatarUrl()" alt="User" class="user-avatar-small">
            </div>

            <div class="avatar-dropdown-menu" *ngIf="isAvatarMenuOpen()">
                
              <a class="menu-item profile-link-btn" routerLink="/profile" (click)="isAvatarMenuOpen.set(false)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5.121 17.804A13.935 13.935 0 0112 16c2.5 0 4.847.655 6.879 1.804M15 10a3 3 0 11-6 0 3 3 0 016 0zm6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    Profile
                </a>

                <div class="menu-divider"></div>

                <button class="menu-item sign-out-btn" (click)="signOut()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H7a3 3 0 01-3-3V7a3 3 0 013-3h3a3 3 0 013 3v1"/></svg>
                    Sign Out
                </button>
            </div>
        </div>
        
    </header>

  <div class="menu-overlay" *ngIf="isAvatarMenuOpen()" (click)="toggleAvatarMenu()"></div>

  <div class="modal-backdrop" *ngIf="dialogMode()" (click)="closeConversationDialog()"></div>
  <div class="modal" *ngIf="dialogMode()">
    <div class="create-form" role="dialog" aria-modal="true" (click)="$event.stopPropagation()">
      <h3 *ngIf="dialogMode() === 'rename'">Rename Chat</h3>
      <h3 *ngIf="dialogMode() === 'delete'">Delete Chat</h3>
      <h3 *ngIf="dialogMode() === 'clear'">Clear Chat</h3>

      <p *ngIf="dialogMode() === 'delete'">
        Are you sure you want to delete this chat?
      </p>

      <p *ngIf="dialogMode() === 'clear'">
        Are you sure you want to clear this chat?
      </p>

      <label *ngIf="dialogMode() === 'rename'" class="field">
        <span>Chat name</span>
        <input
          id="rename-chat-input"
          type="text"
          [ngModel]="renameDraft()"
          (ngModelChange)="renameDraft.set($event)"
          [ngModelOptions]="{ standalone: true }"
          maxlength="60"
          placeholder="Enter chat name">
      </label>

      <div class="modal-actions">
        <button type="button" class="btn secondary" (click)="closeConversationDialog()">Cancel</button>
        <button
          type="button"
          class="btn"
          [class.primary]="dialogMode() === 'rename'"
          [class.danger]="dialogMode() === 'delete' || dialogMode() === 'clear'"
          [disabled]="dialogMode() === 'rename' && !renameDraft().trim()"
          (click)="confirmConversationDialog()">
          {{ dialogMode() === 'delete' ? 'Delete' : dialogMode() === 'clear' ? 'Clear' : 'Save' }}
        </button>
      </div>
    </div>
  </div>

  <div class="profile-layout-container">
    <div class="chat-layout">
      <aside class="card history-sidebar">
        <div class="sidebar-header">
          <h4 class="sidebar-title">Chats</h4>
          <button type="button" class="secondary-btn" (click)="startNewChat()">➕ New Chat</button>
        </div>

        <div class="history-list" role="list">
          <button
            *ngFor="let conversation of sortedConversations()"
            type="button"
            class="history-item"
            [class.active]="activeConversationId() === conversation.id"
            (click)="openConversation(conversation.id)">
            <span class="history-item-title">{{ conversation.title || 'New chat' }}</span>
            <span class="history-item-date">{{ conversation.updatedAt | date:'short' }}</span>
          </button>
        </div>

        <div class="history-actions" *ngIf="activeConversationId() as selectedId">
          <button type="button" class="secondary-btn" (click)="renameConversation(selectedId)">✏️ Rename</button>
          <button type="button" class="secondary-btn danger-btn" (click)="deleteConversation(selectedId)">🗑️ Delete</button>
        </div>
      </aside>

      <div class="card chat-card">
        <div class="chat-header-row">
          <h3 class="text-xl font-semibold text-center text-white">Fynx AI Chat</h3>
          <div class="chat-actions">
            <button *ngIf="isStreaming()" type="button" class="secondary-btn stop-btn" (click)="stopStreamingResponse()">Stop</button>
            <button type="button" class="secondary-btn" (click)="clearChat()" [disabled]="!canClearChat() || isStreaming()">Clear Chat</button>
          </div>
        </div>

        <div class="messages" #messagesContainer>
          <div *ngFor="let m of messages(); trackBy: trackByFn" [ngClass]="m.role">
           <div class="message-bubble">
               <span *ngIf="m.role === 'ai'" class="ai-line-wrap">
                 <span [innerHTML]="formatAiResponse(m.text)"></span>
                 <button class="tts-btn" type="button" (click)="speak(m.text)" title="Read aloud">🔊</button>
               </span>
               <span *ngIf="m.role !== 'ai'" [innerHTML]="formatAiResponse(m.text)"></span>
          </div>
          </div>
          <div *ngIf="isLoading()" class="ai thinking">
            <div class="message-bubble">
              <span class="animate-pulse">🤔 ... Generating response...</span>
            </div>
          </div>
          <div #messagesEnd></div>
        </div>

        <form (ngSubmit)="send()" class="input-area">
          <div class="voice-controls">
            <button
              type="button"
              class="record-btn"
              [class.recording]="isRecording()"
              [disabled]="isLoading() || !isVoiceRecordingSupported()"
              [attr.aria-label]="voiceRecordingButtonLabel()"
              [attr.aria-pressed]="isRecording()"
              (click)="toggleVoiceRecording()">
              {{ isRecording() ? '⏹️ Stop' : '🎙️ Record' }}
            </button>
            <span *ngIf="isRecording()" class="recording-time" aria-hidden="true">
              {{ recordingDurationSeconds() }}s
            </span>
            <span class="sr-only" aria-live="polite">{{ recordingStatus() }}</span>
          </div>
          <input [(ngModel)]="text" name="text" placeholder="Ask the AI..." [disabled]="isLoading() || isRecording()" (keydown)="onMessageInputKeydown($event)" required>
          <button type="submit" [disabled]="isLoading() || (!text.trim() && !isRecording())">
            {{ isLoading() ? 'Sending...' : 'Send' }}
          </button>
        </form>
      </div>

    </div>
  </div>
</div>
